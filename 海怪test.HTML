<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">

  <title>深海异变 · 末世人格测试</title>

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {

      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
      padding: 16px;
      color: #d6e6f0;
    }

    .test-container {
      max-width: 700px;
      width: 100%;
      background: rgba(8, 28, 40, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid #2c5f7a;
      border-radius: 32px;
      padding: 24px 20px 28px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7), 0 0 0 1px #1e4b62 inset;
      transition: all 0.2s;
    }

    h1 {
      font-size: 2rem;
      font-weight: 300;
      letter-spacing: 4px;
      text-align: center;
      color: #b3e4ff;
      text-shadow: 0 0 8px #00a6ff;
      margin-bottom: 6px;
      word-break: break-word;
    }

    .subhead {
      text-align: center;
      font-size: 0.9rem;
      color: #8bbcdb;
      border-bottom: 1px dashed #2c6c8f;
      padding-bottom: 18px;
      margin-bottom: 12px;
    }

    /* 进度条 */
    .progress-area {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .progress-text {
      font-size: 1rem;
      font-weight: 500;
      color: #b0defa;
      min-width: 70px;
    }

    .progress-bar-bg {
      flex: 1;
      height: 6px;
      background: #1a3f52;
      border-radius: 20px;
      box-shadow: inset 0 1px 4px #04131c;
    }

    .progress-bar-fill {
      height: 6px;
      border-radius: 20px;
      background: linear-gradient(90deg, #3ec1ff, #6fd9ff);
      width: 0%;
      transition: width 0.2s ease;
      box-shadow: 0 0 10px #2fa7e0;
    }

    /* 问题卡片 */
    .question-card {
      background: #0e2633c9;
      border-radius: 28px;
      padding: 24px 20px 18px;
      border: 1px solid #2f718b;
      box-shadow: 0 8px 0 #05161e;
      margin-bottom: 24px;
    }

    .question-num {
      display: inline-block;
      background: #1b4b60;
      padding: 4px 16px;
      border-radius: 40px;
      font-size: 0.8rem;
      letter-spacing: 1px;
      color: #cef0ff;
      margin-bottom: 16px;
      border: 1px solid #48a9cf;
    }

    .question-text {
      font-size: 1.4rem;
      font-weight: 500;
      line-height: 1.4;
      margin-bottom: 28px;
      color: #e2f2ff;
      text-shadow: 0 2px 3px #04141e;
    }

    .options-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .option-btn {
      background: #102e3d;
      border: 1.5px solid #286480;
      border-radius: 50px;
      padding: 14px 20px;
      font-size: 1.05rem;
      text-align: left;
      color: #d1ebff;
      font-weight: 450;
      box-shadow: 0 4px 0 #08212b;
      cursor: pointer;
      transition: all 0.1s ease;
      backdrop-filter: blur(5px);
      line-height: 1.4;
      word-break: break-word;
    }

    .option-btn:hover {
      background: #1b4357;
      border-color: #5faacb;
      transform: translateY(-1px);
      box-shadow: 0 5px 0 #08212b;
    }

    .option-btn.selected {
      background: #1f647e;
      border-color: #9de0ff;
      color: white;
      box-shadow: 0 0 10px #3fa2d0, 0 4px 0 #063142;
      transform: translateY(1px);
    }

    .nav-buttons {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      margin-top: 6px;
    }

    .nav-btn {
      background: #163e50;
      border: none;
      border-bottom: 4px solid #0a202b;
      color: #dcf2ff;
      padding: 12px 22px;
      font-size: 1.2rem;
      font-weight: 600;
      border-radius: 48px;
      cursor: pointer;
      flex: 1;
      text-align: center;
      transition: 0.1s;
      box-shadow: 0 4px 8px #030e14;
      letter-spacing: 1px;
      backdrop-filter: blur(4px);
    }

    .nav-btn:active {
      transform: translateY(2px);
      border-bottom-width: 2px;
    }

    .nav-btn:disabled {
      opacity: 0.4;
      transform: none;
      pointer-events: none;
      filter: grayscale(0.6);
    }

    .result-panel {
      background: #0a2633e0;
      border-radius: 24px;
      padding: 24px 20px;
      border: 1px solid #3b8eb0;
      margin-top: 10px;
    }

    .role-name {
      font-size: 2.6rem;
      font-weight: 600;
      color: #f2e9c0;
      text-shadow: 0 0 15px #ffd966;
      margin-bottom: 5px;
    }

    .danger-level {
      font-size: 1.2rem;
      background: #9e2b2b40;
      display: inline-block;
      padding: 4px 18px;
      border-radius: 30px;
      border-left: 4px solid #ff7979;
      margin-bottom: 16px;
    }

    .role-detail {
      background: #0f2733;
      border-radius: 20px;
      padding: 18px;
      margin: 16px 0;
    }

    .dimension-box {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 20px;
      margin: 18px 0 10px;
    }

    .dim-item {
      flex: 1 0 120px;
    }

    .dim-label {
      font-size: 0.8rem;
      color: #9dc1d9;
    }

    .dim-bar {
      height: 10px;
      background: #143746;
      border-radius: 12px;
      margin-top: 4px;
    }

    .dim-fill {
      height: 10px;
      border-radius: 12px;
      background: #61cfff;
      width: 0%;
    }

    .restart-btn {
      background: #1d5068;
      border: none;
      border-bottom: 4px solid #0a2c3b;
      color: white;
      font-size: 1.2rem;
      padding: 14px 20px;
      border-radius: 48px;
      width: 100%;
      margin-top: 24px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.1s;
    }

    .restart-btn:active {
      transform: translateY(3px);
      border-bottom-width: 2px;
    }

    .summary-text {
      font-style: italic;
      font-size: 1.1rem;
      border-left: 4px solid #8fcbff;
      padding-left: 16px;
      margin: 18px 0;
    }

    .footnote {
      margin-top: 16px;
      font-size: 0.8rem;
      color: #86b3cc;
      text-align: center;
    }

    .hidden {
      display: none !important;
    }

    .flex-center {
      display: flex;
      justify-content: center;
    }
  </style>
</head>

      {

        options: [

          { text: "被队友戏弄或无视。", character: "涅柔斯", score: 2, dim: { Control:0, Social:2, Logic:0, Aggression:0 } }

          { text: "能够分泌治愈一切的特殊物质。", character: "普罗透斯", score: 2, dim: { Control:0, Social:0, Logic:2, Aggression:0 } },

      },
      {
        text: "在物资极度匮乏的末世，你如何看待“同情心”？",
        options: [

          { text: "虽然嘴上不说，但会默默为善良的生物留一线生机。", character: "夏意", score: 2, dim: { Control:0, Social:0, Logic:0, Aggression:0 } }, // Emotion忽略，仅用于角色
          { text: "只要对方能陪我玩，我可以分享我的小牧鱼。", character: "涅柔斯", score: 3, dim: { Control:0, Social:3, Logic:0, Aggression:0 } },
          { text: "同情心要有，但必须建立在理性决策之上。", character: "安莉", score: 3, dim: { Control:0, Social:0, Logic:3, Aggression:0 } }
        ]
      },
      {
        text: "当你感到压力非常大时，你会选择？",
        options: [
          { text: "去海面上疯狂跳跃旋转。", character: "克拉肯", score: 3, dim: { Control:0, Social:3, Logic:0, Aggression:0 } },
          { text: "沉入万米海沟宅着，谁也不见。", character: "刻托", score: -3, dim: { Control:0, Social:-3, Logic:0, Aggression:0 } },
          { text: "找一个坚硬的物体不停地敲打解压。", character: "咕噜噜", score: 3, dim: { Control:0, Social:0, Logic:0, Aggression:3 } },
          { text: "彻底断开与外界的联系，大睡一场。", character: "普罗透斯", score: -2, dim: { Control:0, Social:0, Logic:0, Aggression:-2 } }
        ]
      },
      {
        text: "你的伴侣想要离开你，你的第一反应是？",
        options: [
          { text: "哪怕是拥抱一具尸体，也绝不松手。", character: "塞壬", score: 3, dim: { Control:3, Social:0, Logic:0, Aggression:0 } },
          { text: "虽然内心极度痛苦，但表现得冷淡且疏离。", character: "夏意", score: 3, dim: { Control:0, Social:-3, Logic:0, Aggression:0 } },
          { text: "碎碎念地数落对方的无情，希望能挽留。", character: "涅柔斯", score: 3, dim: { Control:0, Social:3, Logic:0, Aggression:0 } },
          { text: "冷静分析对方离开的原因并评估损益。", character: "阿碧瑟", score: 3, dim: { Control:0, Social:0, Logic:3, Aggression:0 } }
        ]
      }
    ];

    // ---------- 状态 ----------
    let currentIndex = 0;               // 0~17
    let selectedAnswers = new Array(18).fill(null); // 每道题选中选项索引
    let roleScores = {};
    let dimScores = { Control:0, Social:0, Logic:0, Aggression:0 };

    // DOM 元素
    const quizSection = document.getElementById('quizSection');
    const resultSection = document.getElementById('resultSection');
    const questionDisplay = document.getElementById('questionDisplay');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const progressLabel = document.getElementById('progressLabel');
    const progressFill = document.getElementById('progressFill');
    const restartBtn = document.getElementById('restartBtn');

    // 初始化分数
    function resetScores() {
      roleScores = {};
      Object.keys(CHARACTERS).forEach(name => roleScores[name] = 0);
      dimScores = { Control:0, Social:0, Logic:0, Aggression:0 };
    }
    resetScores();

    // 重新开始
    function restartTest() {
      currentIndex = 0;
      selectedAnswers = new Array(18).fill(null);
      resetScores();
      renderQuestion();
      quizSection.classList.remove('hidden');
      resultSection.classList.add('hidden');
      updateNavButtons();
    }

    // 应用选项分数变更 (加/减)
    function applyOption(option, isAdd = true) {
      const mult = isAdd ? 1 : -1;
      roleScores[option.character] = (roleScores[option.character] || 0) + option.score * mult;
      const dim = option.dim;
      dimScores.Control += dim.Control * mult;
      dimScores.Social += dim.Social * mult;
      dimScores.Logic += dim.Logic * mult;
      dimScores.Aggression += dim.Aggression * mult;
    }

    // 更新上一题/下一题状态
    function updateNavButtons() {
      prevBtn.disabled = (currentIndex === 0);
      if (currentIndex === 17) {
        nextBtn.textContent = '🌊 揭晓人格';
      } else {
        nextBtn.textContent = '下一题 ▶';
      }
      const selected = selectedAnswers[currentIndex];
      nextBtn.disabled = (selected === null);
    }

    // 渲染当前题目
    function renderQuestion() {
      const q = questions[currentIndex];
      const selectedIdx = selectedAnswers[currentIndex];
      let html = `<div class="question-num">第 ${currentIndex+1} / 18 题</div>`;
      html += `<div class="question-text">${q.text}</div><div class="options-list">`;
      
      q.options.forEach((opt, idx) => {
        const selectedClass = (selectedIdx === idx) ? 'selected' : '';
        html += `<div class="option-btn ${selectedClass}" data-opt-index="${idx}">${opt.text}</div>`;
      });
      html += `</div>`;
      questionDisplay.innerHTML = html;

      // 绑定选项事件
      document.querySelectorAll('.option-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const index = parseInt(btn.dataset.optIndex);
          selectOption(currentIndex, index);
        });
      });

      progressLabel.textContent = `${currentIndex+1} / 18`;
      progressFill.style.width = `${((currentIndex+1)/18)*100}%`;
      updateNavButtons();
    }

    // 处理选项选择
    function selectOption(qIdx, optIdx) {
      const prevSelected = selectedAnswers[qIdx];
      const question = questions[qIdx];
      
      // 如果之前有选择，先移除旧分数
      if (prevSelected !== null) {
        applyOption(question.options[prevSelected], false);
      }
      // 添加新分数
      const newOpt = question.options[optIdx];
      applyOption(newOpt, true);
      
      selectedAnswers[qIdx] = optIdx;
      renderQuestion(); // 刷新高亮
    }

    // 下一题 / 完成
    function goToNext() {
      if (selectedAnswers[currentIndex] === null) return;
      if (currentIndex === 17) {
        // 显示结果
        showResult();
      } else {
        currentIndex++;
        renderQuestion();
      }
    }

    function goToPrev() {
      if (currentIndex > 0) {
        currentIndex--;
        renderQuestion();
      }
    }

    // 判定最终角色 (唯一)
    function determineFinalCharacter() {
      let maxScore = -Infinity;
      let candidates = [];
      for (let [name, score] of Object.entries(roleScores)) {
        if (score > maxScore) { maxScore = score; candidates = [name]; }
        else if (score === maxScore) candidates.push(name);
      }
      if (candidates.length === 1) return candidates[0];
      // 平局裁决
      for (let tieName of TIE_BREAKER) {
        if (candidates.includes(tieName)) return tieName;
      }
      return candidates[0];
    }

    function showResult() {
      quizSection.classList.add('hidden');
      resultSection.classList.remove('hidden');
      
      const finalRole = determineFinalCharacter();
      const data = CHARACTERS[finalRole];
      
      document.getElementById('roleTitle').textContent = finalRole;
      document.getElementById('dangerBadge').textContent = `⚠️ 危险等级：${data.danger}`;
      document.getElementById('keywords').textContent = data.keywords;
      document.getElementById('behavior').textContent = data.behavior;
      document.getElementById('teamPos').textContent = data.team;
      document.getElementById('summaryLine').textContent = data.summary;

      // 维度可视化
      const dims = ['Control','Social','Logic','Aggression'];
      const dimNames = { Control:'控制欲', Social:'社交性', Logic:'理性值', Aggression:'攻击性' };
      let dimHtml = '';
      dims.forEach(d => {
        const val = dimScores[d] || 0;
        const percent = Math.min(100, Math.max(0, (val+10)*4 )); // 简易映射
        dimHtml += `<div class="dim-item"><span class="dim-label">${dimNames[d]} ${val>0?'+'+val:val}</span><div class="dim-bar"><div class="dim-fill" style="width:${percent}%"></div></div></div>`;
      });
      document.getElementById('dimensionStats').innerHTML = dimHtml;
    }

    // 事件绑定
    prevBtn.addEventListener('click', goToPrev);
    nextBtn.addEventListener('click', goToNext);
    restartBtn.addEventListener('click', restartTest);

    // 初始化渲染
    renderQuestion();
  })();
</script>
